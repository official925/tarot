<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Tarot System</title>

<link
rel="stylesheet"
href="style.css"
>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

</head>

<body>

<div class="container">

    <!-- ヘッダー -->

    <header>

        <h1>
        len_link_System™
        </h1>

        <p>
            アルカナディープ解析モジュール
        </p>

    </header>

    <!-- 基本情報 -->

    <section class="panel">

        <h2>
            基本情報
        </h2>

        <div class="grid">

            <input
            type="datetime-local"
            id="date"
            >

            <input
            type="text"
            id="client"
            placeholder="相談者名"
            >

            <input
            type="text"
            id="birth"
            placeholder="生年月日"
            >

            <input
            type="text"
            id="age"
            placeholder="年代"
            >

            <select id="gender">

                <option>
                    男性
                </option>

                <option>
                    女性
                </option>

                <option>
                    その他
                </option>

            </select>

            <input
            type="text"
            id="category"
            placeholder="相談カテゴリ"
            >

        </div>

    </section>

    <!-- カード -->

    <section class="panel">

        <div class="panel-head">

            <h2>
                選択カード
            </h2>

            <button
            id="addCardBtn"
            >

            ＋ カード追加

            </button>

        </div>

        <div
        id="cardSlots"
        >

        </div>

    </section>

    <!-- 解釈 -->

    <section class="panel">

        <h2>
            リーディング結果
        </h2>

        <div
        id="interpretation"
        >

        カードを選択してください

        </div>

    </section>

    <!-- 相談内容 -->

    <section class="panel">

        <h2>
            相談内容
        </h2>

        <textarea
        id="situation"
        placeholder="相談内容・現状"
        ></textarea>

        <textarea
        id="question"
        placeholder="質問内容"
        ></textarea>

    </section>

    <!-- アドバイス -->

    <section class="panel">

        <h2>
            メモ
        </h2>

        <textarea
        id="memo"
        placeholder="自由メモ"
        ></textarea>

    </section>

    <!-- ボタン -->

    <section class="panel">

        <div class="button-group">

            <button
            id="copyBtn"
            >

            TSVコピー

            </button>

            <button
            id="saveBtn"
            >

            保存

            </button>

            <button
            id="historyBtn"
            >

            履歴表示

            </button>

        </div>

    </section>

    <!-- 出力 -->

    <section class="panel">

        <h2>
            TSV出力
        </h2>

        <textarea
        id="output"
        readonly
        ></textarea>

    </section>

    <!-- 履歴 -->

    <section class="panel">

        <h2>
            保存履歴
        </h2>

        <div
        id="historyList"
        >

        </div>

    </section>

</div>

<!-- モーダル -->

<div
id="cardModal"
class="modal"
>

    <div class="modal-content">

        <div class="modal-header">

            <h2>

            カード選択

            </h2>

            <button
            id="closeModal"
            >

            ×

            </button>

        </div>

        <div
        class="orientation-select"
        >

            <label>

                <input
                type="radio"
                name="modalOrientation"
                value="upright"
                checked
                >

                正位置

            </label>

            <label>

                <input
                type="radio"
                name="modalOrientation"
                value="reversed"
                >

                逆位置

            </label>

        </div>

        <h3>

        大アルカナ

        </h3>

        <div
        id="majorArcana"
        class="card-list"
        >

        </div>

    </div>

</div>

<footer class="footer">
    <p>
        © <span id="year"></span> <span class="footer-name">Ren</span> · Tarot System™
    </p>
</footer>

<script src="tarotData.js"></script>
<script src="script.js"></script>

</body>
</html>
